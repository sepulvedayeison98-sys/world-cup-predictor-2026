name: Sync NBA (API-Basketball)

# Diario 08:00 UTC (madrugada en EE.UU., tras cerrar la jornada NBA):
# ingesta resultados/calendario y recalibra el motor nba-1.0.
# Cuota API-Basketball (plan Free): 100 req/día → cada corrida usa ~2.
# Requiere secret: CRON_SECRET.

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  nba:
    runs-on: ubuntu-latest
    steps:
      - name: Ingesta + calibración NBA
        env:
          APP_URL: 'https://world-cup-predictor-2026-flax.vercel.app'
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -uo pipefail
          CRON_SECRET="$(printf %s "$CRON_SECRET" | tr -d '[:space:]')"
          AUTH="Authorization: Bearer $CRON_SECRET"
          curl -fsS --retry 3 --retry-delay 15 --retry-all-errors --max-time 120 \
            "$APP_URL/api/sync/nba/ingest" -H "$AUTH" \
            || { echo "::warning::Ingesta NBA falló tras reintentos."; exit 0; }
          curl -fsS --retry 3 --retry-delay 15 --retry-all-errors --max-time 120 \
            "$APP_URL/api/sync/nba/calibrate" -H "$AUTH" \
            || { echo "::warning::Calibración NBA falló tras reintentos."; exit 0; }
