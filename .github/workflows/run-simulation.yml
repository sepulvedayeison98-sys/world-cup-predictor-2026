name: Simulacion Monte Carlo

# Corre la simulacion Monte Carlo del torneo cada 6 horas y guarda
# las probabilidades por equipo/fase. Resiliente: reintenta ante errores
# transitorios. Requiere los secrets del repo: APP_URL y CRON_SECRET.

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  simulate:
    runs-on: ubuntu-latest
    steps:
      - name: Correr simulacion del torneo
        env:
          APP_URL: ${{ secrets.APP_URL || 'https://world-cup-predictor-2026-flax.vercel.app' }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -uo pipefail
          curl -fsS --retry 3 --retry-delay 12 --retry-all-errors --max-time 180 \
            "$APP_URL/api/simulate" -H "Authorization: Bearer $CRON_SECRET" \
            || { echo "::warning::Simulacion fallo tras reintentos."; exit 0; }
