name: Sync resultados (ESPN)

# Cada 15 min sincroniza resultados desde ESPN API (gratuita, sin cuota).
# ESPN provee: marcadores en vivo, estado del partido, sede, asistencia y árbitro.
#
# Usa el endpoint /api/sync/auto que chequea la ventana de partido primero
# para no hacer writes innecesarios a Supabase fuera de ventanas activas.
#
# Resiliente: reintenta 3 veces ante fallos transitorios. NO marca la
# corrida en rojo por un fallo puntual — el próximo ciclo reintenta.
# El detalle de cada sync queda en la tabla sync_logs.
#
# Requiere los secrets del repo: APP_URL y CRON_SECRET.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  results:
    runs-on: ubuntu-latest
    steps:
      - name: Sincronizar resultados desde ESPN
        env:
          APP_URL: ${{ secrets.APP_URL || 'https://world-cup-predictor-2026-flax.vercel.app' }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -uo pipefail
          AUTH="Authorization: Bearer $CRON_SECRET"
          curl -fsS --retry 3 --retry-delay 10 --retry-all-errors --max-time 90 \
            "$APP_URL/api/sync/auto" -H "$AUTH" \
            || { echo "::warning::Sync ESPN falló tras reintentos; se reintenta en el próximo ciclo."; exit 0; }
