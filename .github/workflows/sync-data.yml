name: Sync resultados

# Cada 20 min revisa la "ventana" (gratis, solo consulta la DB) y sincroniza
# resultados SOLO si hay un partido en juego/por arrancar -> concentra la cuota
# de The Odds API en las ventanas de partido.
#
# Requiere los secrets del repo: APP_URL y CRON_SECRET.

on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:

jobs:
  results:
    runs-on: ubuntu-latest
    steps:
      - name: Revisar ventana y sincronizar resultados si hay partido
        run: |
          set -e
          WINDOW=$(curl -fsS "${{ secrets.APP_URL }}/api/sync/window" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          echo "$WINDOW"
          if echo "$WINDOW" | grep -q '"shouldSyncResults":true'; then
            echo "Partido en ventana -> sincronizando resultados"
            curl -fsS "${{ secrets.APP_URL }}/api/sync/results" \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
          else
            echo "Sin partidos activos -> no se gasta cuota"
          fi
