name: Sync Data
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: pnpm install
      - run: pnpm run build
      - env:
          NEXT_PUBLIC_SUPABASE_URL: <LaTex>${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: $</LaTex>{{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: <LaTex>${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ODDS_API_KEY: $</LaTex>{{ secrets.ODDS_API_KEY }}
          ODDS_API_SPORT: soccer_fifa_world_cup
        run: node -r dotenv/config ./dist/services/sync/odds.js
