name: Run Monte Carlo Simulation
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  simulate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - env:
          VERCEL_URL: <LaTex>${{ secrets.VERCEL_URL }}
        run: curl -X GET "$</LaTex>VERCEL_URL/api/simulate"
