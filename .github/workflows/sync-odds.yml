name: Sync cuotas + recalibracion

# Cada 4 horas: ingesta cuotas de Pinnacle (via The Odds API) y recalibra
# las predicciones con el consenso de mercado.
# Cuota API gratuita: 500 req/mes → cada 4h = ~180 req/mes, dentro del limite.
# Requiere secrets: APP_URL, CRON_SECRET.

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  odds:
    runs-on: ubuntu-latest
    steps:
      - name: Sincronizar cuotas Pinnacle y derivar CO
        env:
          APP_URL: 'https://world-cup-predictor-2026-flax.vercel.app'
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -uo pipefail
          CRON_SECRET="$(printf %s "$CRON_SECRET" | tr -d '[:space:]')"
          AUTH="Authorization: Bearer $CRON_SECRET"
          curl -fsS --retry 3 --retry-delay 12 --retry-all-errors --max-time 180 \
            "$APP_URL/api/sync/odds" -H "$AUTH" \
            || { echo "::warning::Sync de cuotas fallo tras reintentos."; exit 0; }
          curl -fsS --retry 3 --retry-delay 12 --retry-all-errors --max-time 120 \
            "$APP_URL/api/sync/recalibrate" -H "$AUTH" \
            || { echo "::warning::Recalibracion fallo tras reintentos."; exit 0; }
