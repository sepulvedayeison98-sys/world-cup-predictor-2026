# Ping periódico a /api/sync/auto: la ruta decide sola si toca sincronizar
# (solo llama a ESPN cuando hay partido en ventana de juego, ver
# lib/syncWindow.ts). Requiere el secret CRON_SECRET en:
# GitHub → Settings → Secrets and variables → Actions.
name: Sync resultados ESPN

on:
  schedule:
    - cron: '*/10 * * * *'   # cada 10 minutos
  workflow_dispatch: {}       # disparo manual desde la pestaña Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping /api/sync/auto
        run: |
          curl -sS -m 55 --fail-with-body \
            "https://world-cup-predictor-2026-flax.vercel.app/api/sync/auto" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
